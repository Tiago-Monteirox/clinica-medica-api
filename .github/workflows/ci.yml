name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            administrativo/target/*.jar
            agendamento/target/*.jar
            atendimento/target/*.jar
            gateway/target/*.jar
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: [administrativo, agendamento, atendimento, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: .
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          push: true
          tags: |
            ghcr.io/tiago-monteirox/clinica-${{ matrix.module }}:${{ github.sha }}
            ghcr.io/tiago-monteirox/clinica-${{ matrix.module }}:latest

  smoke:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      BASE_URL: http://localhost:8084
      ADMIN_EMAIL: admin@clinica.com
      ADMIN_PASSWORD: admin123
      COMPOSE_FILE: docker-compose.yml:docker-compose.homologation.yml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: .
      - name: Prepare CI environment
        run: |
          cp .env.homologation.example .env.ci
          sed -i "s|^COMPOSE_PROJECT_NAME=.*|COMPOSE_PROJECT_NAME=clinica-ci-${GITHUB_RUN_ID}|" .env.ci
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=$(openssl rand -base64 64)|" .env.ci
      - name: Start stack
        run: docker compose --env-file .env.ci up --build -d
      - name: Wait for gateway
        run: |
          for i in {1..30}; do
            if curl -sf "${BASE_URL}/actuator/health" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env.ci ps
          exit 1
      - run: bash scripts/ci-smoke-test.sh
      - if: always()
        run: docker compose --env-file .env.ci down -v
