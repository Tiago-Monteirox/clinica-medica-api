name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B test
      # JaCoCo gera target/site/jacoco/jacoco.xml em cada modulo durante o test.
      # Codecov detecta automaticamente os XMLs e agrega; sem token em repo publico.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: >-
            administrativo/target/site/jacoco/jacoco.xml,
            agendamento/target/site/jacoco/jacoco.xml,
            atendimento/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          verbose: true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            administrativo/target/*.jar
            agendamento/target/*.jar
            atendimento/target/*.jar
            gateway/target/*.jar
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: [administrativo, agendamento, atendimento, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: .
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          push: true
          tags: |
            ghcr.io/tiago-monteirox/clinica-${{ matrix.module }}:${{ github.sha }}
            ghcr.io/tiago-monteirox/clinica-${{ matrix.module }}:latest

  smoke:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      BASE_URL: http://localhost:8084
      ADMIN_EMAIL: admin@clinica.com
      ADMIN_PASSWORD: admin123
      COMPOSE_FILE: docker-compose.yml:docker-compose.homologation.yml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: .
      - name: Prepare CI environment
        run: |
          cp .env.homologation.example .env.ci
          sed -i "s|^COMPOSE_PROJECT_NAME=.*|COMPOSE_PROJECT_NAME=clinica-ci-${GITHUB_RUN_ID}|" .env.ci
          # openssl rand -base64 64 quebra em 2 linhas (newline aos 76 chars);
          # sem tr -d o sed falha com "unterminated 's' command".
          jwt=$(openssl rand -base64 64 | tr -d '\n')
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${jwt}|" .env.ci
      - name: Start stack
        run: docker compose --env-file .env.ci up --build -d
      - name: Wait for stack (gateway + administrativo)
        run: |
          # /actuator/health do gateway sobe rapido e nao prova que o
          # administrativo esta pronto. Usamos POST /auth/login com creds
          # bobas: 401/422 = admin respondeu (mesmo recusando). 500/502 =
          # admin ainda bootando ou DB nao pronto.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST "${BASE_URL}/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"email":"probe@probe.com","senha":"probe"}' || echo 000)
            case "${code}" in
              401|422)
                echo "OK stack pronta apos ${i} tentativas (HTTP ${code})"
                exit 0
                ;;
              *)
                echo "  ${i}/60 — admin ainda nao pronto (HTTP ${code})"
                sleep 2
                ;;
            esac
          done
          echo "TIMEOUT: stack nao subiu em 120s"
          docker compose --env-file .env.ci ps
          exit 1
      - run: bash scripts/ci-smoke-test.sh
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose --env-file .env.ci ps
          for svc in administrativo agendamento atendimento gateway mysql; do
            echo "===== logs: ${svc} ====="
            docker compose --env-file .env.ci logs --tail=100 ${svc} || true
          done
      - if: always()
        run: docker compose --env-file .env.ci down -v
