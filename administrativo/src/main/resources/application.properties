# ===================================================================
# Módulo: administrativo
# ===================================================================

# Servidor
server.port=8081
spring.application.name=administrativo

# ===================================================================
# Banco de dados ? MySQL (Docker)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_administrativo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

