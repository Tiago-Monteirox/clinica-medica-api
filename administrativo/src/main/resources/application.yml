server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: administrativo

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/clinica_administrativo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-in-production-with-256-bits-minimum}
  expiration-ms: 86400000   # 24 horas

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logbook:
  filter:
    enabled: true
  format:
    style: http
  include:
    - /v1/**
