server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: agendamento

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/clinica_agendamento?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  # ── Cache (Redis) ───────────────────────────────────────────
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: ${CACHE_TTL:5m}
      cache-null-values: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # ── RabbitMQ (consumer de AtendimentoRegistradoEvent) ───────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:clinica}
    password: ${RABBITMQ_PASSWORD:clinica}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          multiplier: 2

  lifecycle:
    timeout-per-shutdown-phase: 30s

# Topologia e nomes dos eventos consumidos pelo agendamento.
# O publisher fica no atendimento; ambos compartilham exchange + routing key.
clinica:
  events:
    exchange: ${CLINICA_EVENTS_EXCHANGE:clinica.events}
    atendimento-registrado-routing-key: atendimento.registrado
    agendamento-atendimento-registrado-queue: agendamento.atendimento-registrado
    enabled: ${CLINICA_EVENTS_ENABLED:true}

administrativo:
  url: ${ADMINISTRATIVO_URL:http://localhost:8081}

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-in-production-with-256-bits-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logbook:
  filter:
    enabled: true
  format:
    style: http
  include:
    - /v1/**


# ── Logging (SLF4J + Logback default do Spring Boot) ────────
# Pacote da aplicação em INFO; demais frameworks usam nível default.
# Para debug local, suba para DEBUG via env var: LOGGING_LEVEL_BR_EDU_IMEPAC=DEBUG
logging:
  level:
    br.edu.imepac: ${LOG_LEVEL_APP:INFO}
