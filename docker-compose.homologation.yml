# ─── Overlay HOMOLOGATION ───────────────────────────────────────────────────
# Adiciona um único MySQL local com 3 schemas (clinica_administrativo,
# clinica_agendamento, clinica_atendimento) sobre o docker-compose.yml base.
# Uso:
#   docker compose --env-file .env.homologation \
#     -f docker-compose.yml -f docker-compose.homologation.yml \
#     up --build -d
# Veja .env.homologation.example para as variáveis esperadas.

services:

  mysql:
    image: mysql:8.3
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - clinica_mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [clinica-net]

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "no"]
    networks: [clinica-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-clinica}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-clinica}
    networks: [clinica-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Expor portas dos serviços facilita Swagger e debug em homologation.
  administrativo:
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  agendamento:
    ports:
      - "8082:8082"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-clinica}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-clinica}
    depends_on:
      mysql:
        condition: service_healthy
      administrativo:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  atendimento:
    ports:
      - "8083:8083"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-clinica}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-clinica}
    depends_on:
      mysql:
        condition: service_healthy
      agendamento:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  gateway:
    ports:
      - "${GATEWAY_HOST_PORT:-8084}:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  clinica_mysql_data:
