# ─── Overlay PRODUCTION ─────────────────────────────────────────────────────
# Topologia database-per-service real: 1 MySQL dedicado por microsserviço.
#   - db-administrativo  → host:3308, schema clinica_administrativo
#   - db-agendamento     → host:3309, schema clinica_agendamento
#   - db-atendimento     → host:3310, schema clinica_atendimento
# Cada serviço Java conecta no SEU banco usando um usuário próprio (svc_*)
# com privilégio restrito ao seu schema (princípio do menor privilégio).
#
# Uso:
#   docker compose --env-file .env.production \
#     -f docker-compose.yml -f docker-compose.production.yml \
#     up --build -d
#
# Variáveis: ver .env.production.example.

services:

  # ── Bancos: um por serviço ────────────────────────────────────────────────

  db-administrativo:
    image: mysql:8.3
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${ADMIN_DB_HOST_PORT:-3308}:3306"
    volumes:
      - db_administrativo_data:/var/lib/mysql
      - ./sql/init-administrativo.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [clinica-net]

  db-agendamento:
    image: mysql:8.3
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${AGENDAMENTO_DB_HOST_PORT:-3309}:3306"
    volumes:
      - db_agendamento_data:/var/lib/mysql
      - ./sql/init-agendamento.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [clinica-net]

  db-atendimento:
    image: mysql:8.3
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${ATENDIMENTO_DB_HOST_PORT:-3310}:3306"
    volumes:
      - db_atendimento_data:/var/lib/mysql
      - ./sql/init-atendimento.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [clinica-net]

  # ── Redis ─────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [clinica-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-clinica}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-clinica}
    networks: [clinica-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Aplicação: cada serviço espera SEU banco saudável ────────────────────

  administrativo:
    restart: always
    depends_on:
      db-administrativo:
        condition: service_healthy

  agendamento:
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      db-agendamento:
        condition: service_healthy
      administrativo:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  atendimento:
    restart: always
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      db-atendimento:
        condition: service_healthy
      agendamento:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  gateway:
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  db_administrativo_data:
  db_agendamento_data:
  db_atendimento_data:
  redis_data:
