# ─── Base comum dos 4 microsserviços ────────────────────────────────────────
# Este arquivo é AMBIENTE-NEUTRO. Não declara MySQL nem expõe portas no host.
# Use sempre com um dos overlays:
#   docker compose --env-file .env.homologation -f docker-compose.yml -f docker-compose.homologation.yml up --build -d
#   docker compose --env-file .env.production   -f docker-compose.yml -f docker-compose.production.yml   up --build -d
# Variáveis esperadas no .env: ver .env.homologation.example / .env.production.example.

services:

  administrativo:
    build:
      context: .
      args:
        MODULE: administrativo
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: ${ADMIN_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${ADMIN_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ADMIN_DB_PASSWORD}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom}
    networks: [clinica-net]

  agendamento:
    build:
      context: .
      args:
        MODULE: agendamento
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: ${AGENDAMENTO_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${AGENDAMENTO_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AGENDAMENTO_DB_PASSWORD}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      ADMINISTRATIVO_URL: http://administrativo:8081
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom}
    depends_on:
      administrativo:
        condition: service_started
    networks: [clinica-net]

  atendimento:
    build:
      context: .
      args:
        MODULE: atendimento
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: ${ATENDIMENTO_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${ATENDIMENTO_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ATENDIMENTO_DB_PASSWORD}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      AGENDAMENTO_URL: http://agendamento:8082
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom}
    depends_on:
      agendamento:
        condition: service_started
    networks: [clinica-net]

  gateway:
    build:
      context: .
      args:
        MODULE: gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      ADMINISTRATIVO_URL: http://administrativo:8081
      AGENDAMENTO_URL: http://agendamento:8082
      ATENDIMENTO_URL: http://atendimento:8083
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom}
    depends_on:
      administrativo:
        condition: service_started
      agendamento:
        condition: service_started
      atendimento:
        condition: service_started
    networks: [clinica-net]

networks:
  clinica-net:
    driver: bridge
