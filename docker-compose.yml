version: "3.9"

services:

  # ── Banco de dados ────────────────────────────────────────────────────────────
  # Um único MySQL durante o desenvolvimento. O init.sql cria os 3 bancos.
  # Na stack completa (ver docs/09-DOCKER.md), migrar para 3 containers separados.
  mysql:
    image: mysql:8.3
    container_name: clinica-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: clinica_administrativo
    ports:
      - "3307:3306"
    volumes:
      - clinica_mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [clinica-net]

  # ── Módulo administrativo ─────────────────────────────────────────────────────
  administrativo:
    build:
      context: .
      args:
        MODULE: administrativo
    container_name: clinica-administrativo
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinica_administrativo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
    depends_on:
      mysql:
        condition: service_healthy
    networks: [clinica-net]

  # ── Módulo agendamento (descomente quando implementado — Fase 3) ──────────────
  # agendamento:
  #   build:
  #     context: .
  #     args:
  #       MODULE: agendamento
  #   container_name: clinica-agendamento
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     SERVER_PORT: 8081
  #     SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clinica_agendamento?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
  #     SPRING_DATASOURCE_USERNAME: root
  #     SPRING_DATASOURCE_PASSWORD: ""
  #     ADMINISTRATIVO_URL: http://clinica-administrativo:8081
  #     JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-in-production-with-256-bits-minimum}
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     administrativo:
  #       condition: service_started
  #   networks: [clinica-net]

  # ── Módulo atendimento (descomente quando implementado — Fase 4) ──────────────
  # atendimento:
  #   build:
  #     context: .
  #     args:
  #       MODULE: atendimento
  #   container_name: clinica-atendimento
  #   restart: unless-stopped
  #   ports:
  #     - "8083:8083"
