server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # ── CORS global ────────────────────────────────────────
      # Permite que o api-console (frontend estático servido em
      # localhost:5174 / :8000) chame este gateway diretamente do
      # browser. Allow-list local explícita; nunca usar "*" com
      # allow-credentials.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5174"
              - "http://127.0.0.1:5174"
              - "http://localhost:8000"
              - "http://127.0.0.1:8000"
              - "http://localhost:5500"
              - "http://127.0.0.1:5500"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Origin
              - X-Requested-With
              - X-Request-Id
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth
          uri: ${ADMINISTRATIVO_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: administrativo
          uri: ${ADMINISTRATIVO_URL:http://localhost:8081}
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=2

        - id: agendamento
          uri: ${AGENDAMENTO_URL:http://localhost:8082}
          predicates:
            - Path=/api/agendamentos/**
          filters:
            - StripPrefix=2

        - id: atendimento
          uri: ${ATENDIMENTO_URL:http://localhost:8083}
          predicates:
            - Path=/api/atendimentos/**
          filters:
            - StripPrefix=2

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-in-production-with-256-bits-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized


# ── Logging (SLF4J + Logback default do Spring Boot) ────────
# Pacote da aplicação em INFO; demais frameworks usam nível default.
# Para debug local, suba para DEBUG via env var: LOGGING_LEVEL_BR_EDU_IMEPAC=DEBUG
logging:
  level:
    br.edu.imepac: ${LOG_LEVEL_APP:INFO}
